name: NoveC SEO Blog

# Genera un articolo SEO in bozza su WordPress (status: draft, mai publish).
#
# Lancio (pattern §35 del Playbook Nove C):
#   - schedule cron: lunedì 02:00 UTC (~03-04 ora IT), notte dom->lun;
#     la bozza è pronta per la revisione del lunedì mattina.
#   - workflow_dispatch: run manuale dal tab Actions.
#   - push su ops/run.trigger: l'agente lancia il workflow committando/
#     bumpando quel file, senza bisogno del permesso di dispatch.
#
# Osservabilità (§35 auto-commit log): l'output del run viene scritto in
# ops/out/<timestamp>.log e ricommittato su main (con [skip ci]), così
# l'esito è leggibile via `git pull` senza copia-incolla umano.
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "ops/run.trigger"
      - "next.json"

# contents: ricommit del log su main. issues: apre una issue su fallimento (A2).
permissions:
  contents: write
  issues: write

# Un solo run alla volta: evita code/stallo sul free tier (§35).
concurrency:
  group: seo-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Genera articolo e crea bozza WP
        run: |
          mkdir -p ops/out
          OUT="ops/out/$(date -u +%Y%m%dT%H%M%SZ).log"
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          set -o pipefail
          node generate.mjs 2>&1 | tee "$OUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Auto-commit del log su main, anche se il run sopra è fallito.
      # Step eseguito da root (mai working-directory: §35 gotcha sul path doppio).
      - name: Commit log su main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/out/ next.json
          git commit -m "log run $(date -u +%Y%m%dT%H%M%SZ) [skip ci]" || { echo "niente da committare"; exit 0; }
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "log committato su main"; exit 0
            fi
            echo "push respinto, retry $i"; sleep $((2 ** i))
          done
          echo "push del log fallito dopo 3 tentativi"; exit 1

      # A2 (MVP3): se il run fallisce, apri una issue cosi' Daniel viene
      # notificato da GitHub (niente email). Si attiva solo on failure.
      - name: Apri issue su fallimento
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "Il run automatico del blog SEO **è fallito**. La bozza di questa settimana potrebbe non essere stata creata."
            echo ""
            echo "- Run: $RUN_URL"
            echo ""
            echo "Ultime righe di log:"
            echo '```'
            tail -n 30 "$OUT" 2>/dev/null || echo "(log non disponibile: errore prima della generazione)"
            echo '```'
          } > /tmp/issue_body.md
          gh issue create \
            --title "SEO blog: run fallito $(date -u +%Y-%m-%d)" \
            --body-file /tmp/issue_body.md
